project_path: E:/code visualize/codeviz-local
engine: emerge
language: auto
exclude:
  - .git
  - .vs
  - .idea
  - node_modules
  - dist
  - build
  - bin
  - obj
  - out
  - target
  - .venv
  - venv
  - __pycache__
  - x64
  - Debug
  - Release
code_only: true
code_extensions:
  - .c
  - .cc
  - .cpp
  - .cxx
  - .h
  - .hh
  - .hpp
  - .py
  - .pyw
  - .pyi
  - .pyx
  - .pxd
  - .java
  - .r
  - .R
output_dir: ./outputs/latest
open_browser: false
fail_on_engine_error: false
locale: ko
emerge_command:
  - emerge
emerge_args: []
warning_max_file_size_mb: 2
warning_max_directory_depth: 8
